<script>
    // Show/hide appropriate navigation based on role
    function updateNavigation() {
        const userRole = localStorage.getItem('userRole');
        document.querySelector('.admin-nav').style.display = userRole === 'ADMIN' ? 'flex' : 'none';
        document.querySelector('.staff-nav').style.display = userRole === 'STAFF' ? 'flex' : 'none';
    }

    function logout() {
        localStorage.removeItem('userRole');
        localStorage.removeItem('userId');
    }

    // Update navigation when page loads
    updateNavigation();
</script>
